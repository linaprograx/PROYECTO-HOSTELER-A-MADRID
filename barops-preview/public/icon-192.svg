<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" fill="#FF6B35" rx="40"/>

  <!-- Cocktail glass shape forming "B" -->
  <g transform="translate(48, 30)">
    <!-- Glass bowl -->
    <path d="M 12 8 L 8 35 C 8 40 12 45 20 45 L 28 45 C 36 45 40 40 40 35 L 36 8 Z"
          fill="#FFD9C4" stroke="none" opacity="0.9"/>

    <!-- Liquid inside -->
    <path d="M 14 18 L 12 35 C 12 39 15 43 20 43 L 28 43 C 33 43 36 39 36 35 L 34 18 Z"
          fill="#FF8C42" stroke="none"/>

    <!-- Glass stem -->
    <rect x="18" y="44" width="8" height="12" fill="#FFD9C4" rx="2"/>

    <!-- Glass base -->
    <rect x="10" y="56" width="24" height="4" fill="#FFD9C4" rx="2"/>
  </g>

  <!-- Letter B with analytics bars -->
  <g transform="translate(110, 55)">
    <!-- B letter shape -->
    <rect x="0" y="0" width="8" height="35" fill="#FFB86F" rx="2"/>
    <path d="M 8 8 Q 15 8 15 15 Q 10 20 8 20 Z" fill="#FFB86F"/>
    <path d="M 8 22 Q 16 22 16 30 Q 10 35 8 35 Z" fill="#FFB86F"/>

    <!-- Analytics bars -->
    <rect x="20" y="15" width="5" height="15" fill="#FFD700" rx="1" opacity="0.9"/>
    <rect x="28" y="18" width="5" height="12" fill="#FFA500" rx="1" opacity="0.9"/>
    <rect x="36" y="12" width="5" height="18" fill="#FF8C42" rx="1" opacity="0.9"/>
    <rect x="44" y="22" width="5" height="8" fill="#FFB86F" rx="1" opacity="0.9"/>
  </g>
</svg>
