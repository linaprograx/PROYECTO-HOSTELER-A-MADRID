<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#FF6B35" rx="100"/>

  <!-- Cocktail glass shape forming "B" -->
  <g transform="translate(130, 80)">
    <!-- Glass bowl -->
    <path d="M 30 20 L 20 90 C 20 105 30 120 50 120 L 70 120 C 90 120 100 105 100 90 L 90 20 Z"
          fill="#FFD9C4" stroke="none" opacity="0.9"/>

    <!-- Liquid inside -->
    <path d="M 35 45 L 30 90 C 30 100 38 110 50 110 L 70 110 C 82 110 90 100 90 90 L 85 45 Z"
          fill="#FF8C42" stroke="none"/>

    <!-- Glass stem -->
    <rect x="45" y="118" width="20" height="30" fill="#FFD9C4" rx="5"/>

    <!-- Glass base -->
    <rect x="25" y="150" width="60" height="10" fill="#FFD9C4" rx="5"/>
  </g>

  <!-- Letter B with analytics bars -->
  <g transform="translate(290, 150)">
    <!-- B letter shape -->
    <rect x="0" y="0" width="20" height="90" fill="#FFB86F" rx="5"/>
    <path d="M 20 20 Q 40 20 40 40 Q 25 55 20 55 Z" fill="#FFB86F"/>
    <path d="M 20 60 Q 42 60 42 80 Q 25 90 20 90 Z" fill="#FFB86F"/>

    <!-- Analytics bars -->
    <rect x="50" y="35" width="12" height="40" fill="#FFD700" rx="2" opacity="0.9"/>
    <rect x="70" y="45" width="12" height="30" fill="#FFA500" rx="2" opacity="0.9"/>
    <rect x="90" y="25" width="12" height="50" fill="#FF8C42" rx="2" opacity="0.9"/>
    <rect x="110" y="60" width="12" height="15" fill="#FFB86F" rx="2" opacity="0.9"/>
  </g>
</svg>
